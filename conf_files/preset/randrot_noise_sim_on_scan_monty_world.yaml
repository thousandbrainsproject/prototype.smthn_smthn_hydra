# @package _global_
defaults:
  - override /experiment: object_recognition
  - override /experiment_config: eval_evidence
  - override /logging: eval_evidence
  - override /monty_config: evidence_1lm_dist_noise_compact
  - override /env_interface_config: habitat_1sensor_distance_numenta_lab
  - override /eval_env_interface_args: numenta_lab_random

experiment:
  config:
    n_eval_epochs: 10
    monty_config:
      sensor_module_configs:
        sensor_module_0:
          sensor_module_args:
            features: ${benchmarks.default_sensor_features}
            delta_thresholds:
              on_object: 0
              distance: 0.01
            noise_params: ${benchmarks.default_all_noise_params}
            save_raw_obs: false
        sensor_module_1:
          sensor_module_args:
            save_raw_obs: false
