# @package experiment.config
defaults:
  - monty_config/motor_system_config: informed_coarse
  - monty_config/learning_module_configs: evidence_1lm_worldimage
  - monty_config/sensor_module_configs: 1sm_distance_noise

model_name_or_path: ${benchmarks.pretrained_dir}/surf_agent_1lm_numenta_lab_obj/pretrained/

monty_config:
  monty_class: ${monty.class:tbp.monty.frameworks.models.graph_matching.MontyForGraphMatching}
  monty_args:
    num_exploratory_steps: 1000
    min_eval_steps: ${benchmarks.min_eval_steps}
    min_train_steps: 3
    max_total_steps: 2500
  sm_to_agent_dict:
    patch: ${monty.agent_id:agent_id_0}
    view_finder: ${monty.agent_id:agent_id_0}
  sm_to_lm_matrix:
  - - 0
  lm_to_lm_matrix: null
  lm_to_lm_vote_matrix: null
