# @package experiment.config
defaults:
  - monty_config/motor_system_config: naive_scan
  - monty_config/learning_module_configs: evidence_2lm_comp_train
  - monty_config/sensor_module_configs: 2sm_comp

model_name_or_path: ${path.expanduser:${oc.env:MONTY_MODELS}/pretrained_ycb_v12/supervised_pre_training_logos_after_flat_objects/pretrained/}

monty_config:
  monty_class: ${monty.class:tbp.monty.frameworks.models.evidence_matching.model.MontyForEvidenceGraphMatching}
  monty_args:
    num_exploratory_steps: 1000
    min_eval_steps: 3
    min_train_steps: 100
    max_total_steps: 2500
  sm_to_agent_dict:
    patch_0: ${monty.agent_id:agent_id_0}
    patch_1: ${monty.agent_id:agent_id_0}
    view_finder: ${monty.agent_id:agent_id_0}
  sm_to_lm_matrix:
  - - 0
  - - 1
  lm_to_lm_matrix:
  - []
  - - 0
  lm_to_lm_vote_matrix: null
