# @package experiment.config.monty_config.sensor_module_configs
sensor_module_0:
  sensor_module_args:
    features:
    - pose_vectors
    - pose_fully_defined
    - on_object
    - object_coverage
    - min_depth
    - mean_depth
    - hsv
    - principal_curvatures
    - principal_curvatures_log
    sensor_module_id: patch
    save_raw_obs: true
    delta_thresholds:
      on_object: 0
      distance: 0.01
  sensor_module_class: ${monty.class:tbp.monty.frameworks.models.sensor_modules.CameraSM}
sensor_module_1:
  sensor_module_class: ${monty.class:tbp.monty.frameworks.models.sensor_modules.Probe}
  sensor_module_args:
    sensor_module_id: view_finder
    save_raw_obs: true
