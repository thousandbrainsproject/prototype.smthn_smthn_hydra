# @package _global_
defaults:
  - override /experiment: object_recognition
  - override /experiment/experiment_config: eval_evidence
  - override /experiment/logging: tutorial_detailed
  - override /monty: displacement_5lm_dist_tutorial_train
  - override /environment/env_interface_config: habitat_5sensor_distance_tutorial

experiment:
  config:
    n_train_epochs: 1
    min_lms_match: 3
    model_name_or_path: ${path.expanduser:"~/tbp/results/monty/projects/dist_agent_5lm_2obj_train/pretrained"}
    monty_config:
      monty_class: ${monty.class:tbp.monty.frameworks.models.evidence_matching.model.MontyForEvidenceGraphMatching}
      monty_args:
        num_exploratory_steps: 1000
        min_eval_steps: 20
      motor_system_config:
        motor_system_args:
          policy:
            use_goal_state_driven_actions: true
            action_sampler:
              rotation_degrees: 5.0
            _target_: tbp.monty.frameworks.models.motor_policies.InformedPolicy
      learning_module_configs:
        learning_module_0:
          learning_module_class: ${monty.class:tbp.monty.frameworks.models.evidence_matching.learning_module.EvidenceGraphLM}
          learning_module_args:
            max_match_distance: 0.01
            evidence_threshold_config: 80%
            x_percent_threshold: 20
            gsg:
              _target_: tbp.monty.frameworks.models.goal_state_generation.EvidenceGoalStateGenerator
              goal_tolerances:
                location: 0.015
              min_post_goal_success_steps: 5
            hypotheses_updater_args:
              max_nneighbors: 10
            feature_weights:
              patch_0:
                hsv: ${np.array:[1, 0.5, 0.5]}
            tolerances:
              patch_0:
                hsv: ${np.array:[0.1, 0.2, 0.2]}
                principal_curvatures_log: ${np.ones:2}
        learning_module_1:
          learning_module_class: ${monty.class:tbp.monty.frameworks.models.evidence_matching.learning_module.EvidenceGraphLM}
          learning_module_args:
            max_match_distance: 0.01
            evidence_threshold_config: 80%
            x_percent_threshold: 20
            gsg:
              _target_: tbp.monty.frameworks.models.goal_state_generation.EvidenceGoalStateGenerator
              goal_tolerances:
                location: 0.015
              min_post_goal_success_steps: 5
            hypotheses_updater_args:
              max_nneighbors: 10
            feature_weights:
              patch_1:
                hsv: ${np.array:[1, 0.5, 0.5]}
            tolerances:
              patch_1:
                hsv: ${np.array:[0.1, 0.2, 0.2]}
                principal_curvatures_log: ${np.ones:2}
        learning_module_2:
          learning_module_class: ${monty.class:tbp.monty.frameworks.models.evidence_matching.learning_module.EvidenceGraphLM}
          learning_module_args:
            max_match_distance: 0.01
            evidence_threshold_config: 80%
            x_percent_threshold: 20
            gsg:
              _target_: tbp.monty.frameworks.models.goal_state_generation.EvidenceGoalStateGenerator
              goal_tolerances:
                location: 0.015
              min_post_goal_success_steps: 5
            hypotheses_updater_args:
              max_nneighbors: 10
            feature_weights:
              patch_2:
                hsv: ${np.array:[1, 0.5, 0.5]}
            tolerances:
              patch_2:
                hsv: ${np.array:[0.1, 0.2, 0.2]}
                principal_curvatures_log: ${np.ones:2}
        learning_module_3:
